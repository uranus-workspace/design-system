name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: semantic-release (${{ matrix.package.name }})
    # Only run after CI (lint + typecheck + test + build) succeeds on main.
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    # NPM_TOKEN lives on the Production environment (not at the repo level),
    # so this job has to opt-in explicitly — otherwise secrets.NPM_TOKEN is
    # undefined and @semantic-release/npm fails with EINVALIDNPMTOKEN.
    environment: Production
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        package:
          - name: design-system
            dir: packages/design-system
          - name: blocks
            dir: packages/blocks
          - name: ai
            dir: packages/ai
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: true

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: '@uranus-workspace'
          always-auth: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        run: pnpm --filter './packages/*' build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Matrix legs run sequentially (max-parallel: 1). If an earlier leg's
      # semantic-release @git plugin pushed a [skip ci] commit to main, this
      # leg's checkout (pinned to head_sha) would be stale and semantic-release
      # would bail with "local branch is behind the remote one". Fast-forward
      # to origin/main before each release.
      - name: Sync with latest main
        run: git pull --rebase --autostash origin main

      - name: Release ${{ matrix.package.name }}
        working-directory: ${{ matrix.package.dir }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm exec semantic-release
