openapi: 3.1.0
info:
  title: Uranus Design System — public documentation surface
  version: 1.0.0
  description: >
    Read-only HTTP surface of the Uranus Design System docs deployment.
    Described for machine discovery (RFC 9727 service-desc); primary UX is HTML documentation.
servers:
  - url: https://design.uranus.com.br
paths:
  /llms.txt:
    get:
      summary: Compact LLM-oriented index of documentation pages
      responses:
        '200':
          description: Plain text Markdown list
  /llms-full.txt:
    get:
      summary: Full documentation export (raw MDX per page)
      responses:
        '200':
          description: Plain text aggregate
  /sitemap.xml:
    get:
      summary: Sitemap
      responses:
        '200':
          description: XML sitemap
  /robots.txt:
    get:
      summary: Crawler and content-signal directives
      responses:
        '200':
          description: robots.txt
  /openapi.yaml:
    get:
      summary: OpenAPI description of public read-only endpoints
      responses:
        '200':
          description: YAML
  /docs:
    get:
      summary: Human-readable documentation (HTML)
      responses:
        '200':
          description: HTML documentation
  /health:
    get:
      summary: Liveness / health check
      responses:
        '200':
          description: ok
    head:
      summary: Liveness (no body)
      responses:
        '200':
          description: OK
